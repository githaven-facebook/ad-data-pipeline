name: CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ad-data-pipeline
  AIRFLOW_ENV_PROD: production
  AIRFLOW_ENV_STAGING: staging

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
      ecr-image: ${{ steps.build-push.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: image-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }} \
            --tag ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            --label "git.commit=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --cache-from ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Run smoke test on built image
        run: |
          docker run --rm \
            -e AIRFLOW__CORE__LOAD_EXAMPLES=False \
            -e AIRFLOW__CORE__UNIT_TEST_MODE=True \
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }} \
            python -c "import ad_data_pipeline; print('Package import OK:', ad_data_pipeline.__version__)"

      - name: Push Docker image to ECR
        id: build-push
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          echo "image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}" >> $GITHUB_OUTPUT

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Airflow image in staging MWAA
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.ecr-image }} to staging MWAA"
          # In production: update MWAA environment via AWS CLI
          # aws mwaa update-environment \
          #   --name ad-data-pipeline-staging \
          #   --dag-s3-path dags/ \
          #   --plugins-s3-path plugins.zip \
          #   --requirements-s3-path requirements.txt
          echo "Staging deploy triggered"

      - name: Wait for staging deployment
        run: |
          echo "Waiting for staging MWAA environment update..."
          sleep 10
          echo "Staging deployment complete"

      - name: Run smoke tests against staging
        run: |
          echo "Running smoke tests against staging Airflow..."
          # In production: call Airflow REST API to trigger test DAG run
          echo "Staging smoke tests passed"

  deploy-production:
    name: Deploy to Production
    needs: [build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to production MWAA
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.ecr-image }} to production MWAA"
          echo "Production deploy triggered for tag ${{ github.ref_name }}"

      - name: Create deployment record
        run: |
          echo "Deployment record:"
          echo "  Tag: ${{ github.ref_name }}"
          echo "  Image: ${{ needs.build-and-push.outputs.ecr-image }}"
          echo "  Environment: production"
          echo "  Deployed by: ${{ github.actor }}"
          echo "  Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
